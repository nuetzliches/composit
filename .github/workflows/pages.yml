name: pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'install/install.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # Serve install.sh at nuetzliches.github.io/composit/install.sh so the
      # one-liner on the landing page (`curl … install.sh | sh`) resolves.
      - name: Stage install.sh alongside landing page
        run: cp install/install.sh landing/install.sh

      - name: Upload landing artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
