name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (linux musl)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/composit dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist && tar czf ../composit-${{ matrix.target }}.tar.gz *

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/composit.exe" dist/
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          if (Test-Path LICENSE)   { Copy-Item LICENSE dist/ }
          Compress-Archive -Path dist/* -DestinationPath "composit-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: composit-${{ matrix.target }}
          path: |
            composit-${{ matrix.target }}.tar.gz
            composit-${{ matrix.target }}.zip

  docker:
    name: Docker release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nuetzliches/composit:latest
            ghcr.io/nuetzliches/composit:${{ steps.version.outputs.version }}
            ghcr.io/nuetzliches/composit:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: composit-*
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    # Requires a PAT with write access to nuetzliches/homebrew-tap stored
    # as the secret HOMEBREW_TAP_TOKEN. Job is skipped if the secret is absent,
    # so the rest of the release still completes when the tap isn't wired up yet.
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: composit-*
          path: artifacts
      - name: Compute SHA256s and rewrite formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"

          sha_aarch64_darwin=$(sha256sum artifacts/composit-aarch64-apple-darwin/composit-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          sha_x86_64_darwin=$(sha256sum artifacts/composit-x86_64-apple-darwin/composit-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          sha_aarch64_linux=$(sha256sum artifacts/composit-aarch64-unknown-linux-musl/composit-aarch64-unknown-linux-musl.tar.gz | awk '{print $1}')
          sha_x86_64_linux=$(sha256sum artifacts/composit-x86_64-unknown-linux-musl/composit-x86_64-unknown-linux-musl.tar.gz | awk '{print $1}')

          sed -i -e "s/version \".*\"/version \"${VERSION}\"/" install/brew/composit.rb

          # Replace the four sha256 placeholders in-order:
          #   darwin-arm, darwin-x86, linux-arm, linux-x86
          python3 - "$sha_aarch64_darwin" "$sha_x86_64_darwin" "$sha_aarch64_linux" "$sha_x86_64_linux" <<'PY'
          import re, sys
          shas = sys.argv[1:5]
          with open("install/brew/composit.rb") as f:
              text = f.read()
          it = iter(shas)
          text = re.sub(r'sha256 "[A-Za-z0-9_]+"', lambda m: f'sha256 "{next(it)}"', text)
          with open("install/brew/composit.rb", "w") as f:
              f.write(text)
          PY

      - name: Push updated formula to tap
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/nuetzliches/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp install/brew/composit.rb tap/Formula/composit.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/composit.rb
          git diff --cached --quiet || git commit -m "composit ${GITHUB_REF#refs/tags/}"
          git push
