services:
  web:
    image: ghcr.io/widgetshop/web:1.4.0
    ports:
      - "80:80"
    networks:
      - internal
    environment:
      - API_URL=http://api:3000

  api:
    image: ghcr.io/widgetshop/api:2.0.0
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      - DATABASE_URL=${DATABASE_URL}

  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  # DRIFT: introduced by an agent without updating the Compositfile.
  # Violates `allowed_images` — neither ghcr.io/widgetshop/* nor postgres:*.
  cache:
    image: redis:latest
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
