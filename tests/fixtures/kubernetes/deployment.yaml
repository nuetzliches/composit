apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: widgetshop
  labels:
    app: widgetshop
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: widgetshop
      tier: api
  template:
    metadata:
      labels:
        app: widgetshop
        tier: api
    spec:
      containers:
        - name: api
          image: ghcr.io/widgetshop/api:2.0.0
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: widgetshop
spec:
  selector:
    app: widgetshop
    tier: api
  ports:
    - port: 80
      targetPort: 3000
