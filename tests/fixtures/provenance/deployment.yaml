# K8s manifest with metadata.annotations carrying the workload name an
# upstream OAM-style framework recorded. The Compositfile lifts that
# annotation to provenance.source_ref.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/managed-by: flux
  annotations:
    vendor/workload-name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: external/unapproved:1.0
