# Service `api` is generated by an upstream spec generator that records
# provenance via labels. Compositfile opts those keys into structured
# provenance, and the image is intentionally outside the allow list so
# the diff produces a finding the test can read the suffix from.
services:
  api:
    image: external/unapproved:1.0
    labels:
      app.kubernetes.io/managed-by: argocd
      vendor/source: specs/api.yaml
      tier: backend
