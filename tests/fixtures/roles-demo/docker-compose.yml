version: "3.9"

services:
  postgres-db:
    # Role "database" matches (name contains "db" AND image is postgres:*).
    # Violations: image not pinned (latest), port 5432 not exposed,
    # not attached to "backend" network.
    image: postgres:latest
    environment:
      - POSTGRES_DB=demo

  api:
    # Role "api" matches (name == "api").
    # Violation: image prefix "ghcr.io/acme/" mismatched.
    image: ghcr.io/other/api:v1
    ports:
      - "8080:8080"
    networks:
      - backend

networks:
  backend:
