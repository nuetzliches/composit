worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream api_pool {
        server 10.0.0.1:3000;
        server 10.0.0.2:3000;
    }

    server {
        listen 80;
        server_name widgetshop.example.com www.widgetshop.example.com;
        location / {
            proxy_pass http://api_pool;
        }
    }

    server {
        listen 443 ssl;
        server_name secure.widgetshop.example.com;
        ssl_certificate /etc/ssl/widgetshop/cert.pem;
        location / {
            proxy_pass http://api_pool;
        }
    }
}
